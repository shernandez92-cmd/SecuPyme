<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secupyme — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <h1>SECUPYME</h1>
        <p>PROTECCIÓN DIGITAL PARA PYMES</p>
      </div>
      <div class="form-group">
        <label>CORREO ELECTRÓNICO</label>
        <input type="email" id="email" placeholder="correo@empresa.com">
      </div>
      <div class="form-group">
        <label>CONTRASEÑA</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">INGRESAR</button>
      <p class="error-msg" id="error">Credenciales incorrectas</p>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, contraseña: password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('rol', data.rol);
          localStorage.setItem('nombre', data.nombre);
          window.location.href = '/dashboard.html';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (error) {
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
