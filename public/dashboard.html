<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secupyme — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="page-header">
        <h2>PANEL DE CONTROL</h2>
        <p>Resumen de seguridad</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">⚠</div>
          <div class="stat-info">
            <h3 id="totalReportes">0</h3>
            <p>REPORTES TOTALES</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔴</div>
          <div class="stat-info">
            <h3 id="reportesAbiertos">0</h3>
            <p>ABIERTOS</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🟡</div>
          <div class="stat-info">
            <h3 id="reportesEnProceso">0</h3>
            <p>EN PROCESO</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🟢</div>
          <div class="stat-info">
            <h3 id="reportesResueltos">0</h3>
            <p>RESUELTOS</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    cargarSidebar('dashboard');

    async function cargarDatos() {
      const response = await fetch('/api/reportes', {
        headers: { 'authorization': token }
      });
      const reportes = await response.json();

      document.getElementById('totalReportes').textContent = reportes.length;
      document.getElementById('reportesAbiertos').textContent = reportes.filter(r => r.estado === 'abierto').length;
      document.getElementById('reportesEnProceso').textContent = reportes.filter(r => r.estado === 'en proceso').length;
      document.getElementById('reportesResueltos').textContent = reportes.filter(r => r.estado === 'resuelto').length;
    }

    cargarDatos();
  </script>
</body>
</html>
